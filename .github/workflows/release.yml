name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.0"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ github.event.inputs.version || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Package
        run: VERSION="${RELEASE_VERSION}" ./scripts/package.sh

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          target_commitish: ${{ github.sha }}
          files: |
            dist/git-spread_${{ env.RELEASE_VERSION }}_*.tar.gz
            dist/git-spread_${{ env.RELEASE_VERSION }}_*.zip
            dist/checksums.txt
